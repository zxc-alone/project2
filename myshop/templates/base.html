<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Магазин футболок{% endblock %}</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 0; }
        #header { background: #333; color: white; padding: 10px; }
        #header a { color: white; text-decoration: none; margin: 0 10px; }
        #content { padding: 20px; }
        .product-list { display: flex; flex-wrap: wrap; gap: 20px; }
        .product-item { border: 1px solid #ccc; padding: 10px; width: 200px; }
        .cart-info { float: right; }
    </style>
</head>
<body>
    <div id="header">
        <a href="/">Главная</a>
        <div class="cart-info">
            <a href="{% url 'cart:cart_detail' %}">Корзина</a>
        </div>
    </div>
    <div id="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
